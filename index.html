<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso: Portugués Básico — Ruta360</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Fraunces:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a3a7a;
    --blue-mid: #2350a8;
    --blue-light: #eef3ff;
    --blue-mid-light: #d6e2ff;
    --green: #00875a;
    --green-light: #e3f7ef;
    --yellow: #f5c800;
    --yellow-light: #fffbe6;
    --white: #ffffff;
    --ink: #111827;
    --ink2: #374151;
    --muted: #9ca3af;
    --border: #e5e7eb;
    --bg: #f7f9ff;
    --card: #ffffff;
    --red: #cc2200;
    --red-light: #fff0ee;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Plus Jakarta Sans’, sans-serif;
background: var(–bg);
color: var(–ink);
min-height: 100vh;
overflow-x: hidden;
}

/* HERO */
.hero {
background: linear-gradient(135deg, var(–blue) 0%, var(–blue-mid) 60%, #1a6b4a 100%);
padding: 52px 48px 0;
position: relative;
overflow: hidden;
}

.hero::before {
content: ‘’;
position: absolute;
width: 500px; height: 500px;
border-radius: 50%;
background: rgba(255,255,255,0.04);
top: -200px; right: -150px;
pointer-events: none;
}

.hero::after {
content: ‘’;
position: absolute;
width: 200px; height: 200px;
border-radius: 50%;
background: var(–yellow);
opacity: 0.08;
bottom: 20px; left: -60px;
pointer-events: none;
}

.hero-top {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 30px;
animation: drop 0.5s ease both;
}

.brand { background: white; color: var(–blue); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.08em; padding: 5px 12px; border-radius: 4px; }
.flag { font-size: 1.4rem; }
.lang-badge { background: var(–yellow); color: var(–blue); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 4px; }

.hero h1 {
font-family: ‘Fraunces’, serif;
font-size: clamp(2.4rem, 5vw, 4.2rem);
font-weight: 700;
color: white;
line-height: 1.0;
max-width: 640px;
animation: drop 0.5s 0.1s ease both;
}

.hero h1 em {
font-style: italic;
font-weight: 400;
color: var(–yellow);
}

.hero-sub {
margin-top: 14px;
font-size: 1rem;
color: rgba(255,255,255,0.72);
max-width: 500px;
line-height: 1.7;
font-weight: 300;
animation: drop 0.5s 0.2s ease both;
}

.hero-stats {
display: flex;
gap: 0;
margin-top: 36px;
border-top: 1px solid rgba(255,255,255,0.12);
animation: drop 0.5s 0.3s ease both;
}

.hstat {
flex: 1;
padding: 16px 0;
text-align: center;
border-right: 1px solid rgba(255,255,255,0.12);
}

.hstat:last-child { border-right: none; }
.hstat-num { font-family: ‘Fraunces’, serif; font-size: 1.6rem; font-weight: 700; color: var(–yellow); }
.hstat-label { font-size: 0.7rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

/* PROGRESS */
.pbar-wrap {
background: var(–blue);
padding: 12px 48px;
display: flex;
align-items: center;
gap: 16px;
}

.pl { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; font-weight: 700; }
.pb { flex: 1; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.pf { height: 100%; background: var(–yellow); border-radius: 2px; transition: width 0.5s ease; }
.pp { font-size: 0.82rem; font-weight: 800; color: var(–yellow); min-width: 32px; text-align: right; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 270px 1fr; min-height: calc(100vh - 240px); }

/* SIDEBAR */
.sidebar {
background: var(–white);
border-right: 1px solid var(–border);
padding: 24px 0;
position: sticky; top: 0;
height: 100vh; overflow-y: auto;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(–blue-mid-light); }

.mod-grp { margin-bottom: 4px; }

.mod-hd {
display: flex; align-items: center; justify-content: space-between;
padding: 9px 20px;
}

.mod-nm { font-size: 0.67rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(–muted); }
.mod-tg { font-size: 0.64rem; font-weight: 700; background: var(–blue-light); color: var(–blue-mid); border-radius: 3px; padding: 2px 7px; }

.les-b {
width: 100%; display: flex; align-items: flex-start; gap: 10px;
padding: 9px 20px 9px 24px;
background: none; border: none; border-left: 3px solid transparent;
cursor: pointer; text-align: left;
font-family: ‘Plus Jakarta Sans’, sans-serif; font-size: 0.82rem;
color: var(–ink2); transition: all 0.15s; line-height: 1.4;
}

.les-b:hover { background: var(–blue-light); color: var(–ink); }
.les-b.active { background: var(–blue-light); border-left-color: var(–blue-mid); color: var(–blue-mid); font-weight: 700; }
.les-b.done { color: var(–green); }
.les-b.done .ld { color: var(–green); }
.les-b.active .ld { color: var(–blue-mid); }
.ld { flex-shrink: 0; margin-top: 2px; font-size: 0.68rem; color: var(–border); }

/* CONTENT */
.content { padding: 44px 52px; max-width: 860px; }

/* LESSON PIECES */
.lhd {
margin-bottom: 32px; padding-bottom: 28px;
border-bottom: 2px solid var(–border);
animation: fadeUp 0.3s ease both;
}

.ltag {
display: inline-block; background: var(–blue-light); color: var(–blue-mid);
font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 12px;
}

.ltitle {
font-family: ‘Fraunces’, serif;
font-size: clamp(1.5rem, 3vw, 2.3rem); font-weight: 700;
color: var(–ink); line-height: 1.1;
}

.ldesc { margin-top: 10px; font-size: 0.97rem; color: var(–muted); line-height: 1.75; }

.sec { margin-bottom: 34px; animation: fadeUp 0.3s ease both; }

.stitle {
font-size: 0.67rem; font-weight: 800; letter-spacing: 0.16em;
text-transform: uppercase; color: var(–blue-mid); margin-bottom: 14px;
display: flex; align-items: center; gap: 10px;
}

.stitle::after { content: ‘’; flex: 1; height: 1px; background: var(–border); }

.body { font-size: 0.95rem; line-height: 1.85; color: var(–ink2); }
.body strong { color: var(–ink); font-weight: 700; }

/* VOCAB CARD — special for language course */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 12px; }

.vcard {
background: var(–card); border: 1.5px solid var(–border);
border-radius: 10px; padding: 14px 16px;
transition: all 0.2s; cursor: default;
}

.vcard:hover { border-color: var(–blue-mid); box-shadow: 0 4px 14px rgba(35,80,168,0.1); transform: translateY(-1px); }

.vpt { font-family: ‘Fraunces’, serif; font-size: 1.05rem; font-weight: 700; color: var(–blue-mid); margin-bottom: 2px; }
.ves { font-size: 0.82rem; color: var(–ink2); }
.vpron { font-size: 0.72rem; color: var(–muted); margin-top: 3px; font-style: italic; }

/* PHRASE BOX */
.phrase-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

.phrase-item {
display: grid; grid-template-columns: 1fr 1fr;
gap: 0; border: 1.5px solid var(–border);
border-radius: 8px; overflow: hidden;
}

.phrase-pt { background: var(–blue-light); padding: 10px 14px; font-weight: 700; font-size: 0.88rem; color: var(–blue); border-right: 1px solid var(–border); }
.phrase-es { background: var(–white); padding: 10px 14px; font-size: 0.88rem; color: var(–ink2); }

/* GRAMMAR BOX */
.grammar {
background: var(–ink); color: white;
border-radius: 12px; padding: 22px 24px; margin: 16px 0;
position: relative; overflow: hidden;
}

.grammar::before {
content: ‘’; position: absolute;
top: -40px; right: -40px;
width: 120px; height: 120px;
background: var(–blue-mid); opacity: 0.3;
border-radius: 50%;
}

.glabel { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(–yellow); font-weight: 700; margin-bottom: 10px; }
.gtext { font-size: 0.9rem; line-height: 1.85; color: #dde8ff; }
.gtext .ph { color: var(–yellow); font-style: italic; }
.gtext strong { color: white; }

/* CARDS */
.g2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 14px; margin-top: 14px; }
.g3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 14px; }

.card {
background: var(–card); border: 1.5px solid var(–border);
border-radius: 10px; padding: 18px; transition: all 0.2s;
}

.card:hover { border-color: var(–blue-mid); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(35,80,168,0.08); }
.ci { font-size: 1.5rem; margin-bottom: 8px; }
.ct { font-weight: 700; font-size: 0.88rem; color: var(–ink); margin-bottom: 4px; }
.cd { font-size: 0.79rem; color: var(–muted); line-height: 1.55; }

/* CALLOUT */
.callout { border-radius: 10px; padding: 16px 20px; margin: 18px 0; }
.c-tip { background: var(–yellow-light); border-left: 3px solid var(–yellow); }
.c-blue { background: var(–blue-light); border-left: 3px solid var(–blue-mid); }
.c-good { background: var(–green-light); border-left: 3px solid var(–green); }
.c-warn { background: var(–red-light); border-left: 3px solid var(–red); }

.clabel { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.c-tip .clabel { color: #a07800; }
.c-blue .clabel { color: var(–blue-mid); }
.c-good .clabel { color: var(–green); }
.c-warn .clabel { color: var(–red); }
.callout p { font-size: 0.88rem; color: var(–ink2); line-height: 1.65; }

/* LIST */
.lst { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.lst li { display: flex; align-items: flex-start; gap: 10px; font-size: 0.92rem; color: var(–ink2); line-height: 1.65; }
.lst li::before { content: ‘→’; color: var(–blue-mid); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

/* TABLE */
.tw { overflow-x: auto; margin: 14px 0; border: 1.5px solid var(–border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { background: var(–blue); color: white; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 11px 16px; text-align: left; }
td { padding: 10px 16px; border-bottom: 1px solid var(–border); color: var(–ink2); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(–blue-light); }

/* NAV */
.lnav { display: flex; justify-content: space-between; align-items: center; margin-top: 52px; padding-top: 28px; border-top: 2px solid var(–border); }

.nbtn {
display: flex; align-items: center; gap: 8px;
background: var(–white); border: 1.5px solid var(–border);
border-radius: 8px; padding: 11px 18px;
cursor: pointer; color: var(–ink2);
font-family: ‘Plus Jakarta Sans’, sans-serif; font-size: 0.875rem; font-weight: 600;
transition: all 0.15s;
}

.nbtn:hover { border-color: var(–blue-mid); color: var(–blue-mid); }
.nbtn:disabled { opacity: 0.3; cursor: not-allowed; }
.nbtn:disabled:hover { border-color: var(–border); color: var(–ink2); }
.nbtn.primary { background: var(–blue-mid); color: white; border-color: var(–blue-mid); }
.nbtn.primary:hover { background: var(–blue); border-color: var(–blue); color: white; }

.done-btn {
display: block; width: 100%; margin-top: 24px;
padding: 13px; background: transparent;
border: 1.5px solid var(–border); border-radius: 8px;
color: var(–muted);
font-family: ‘Plus Jakarta Sans’, sans-serif; font-size: 0.85rem; font-weight: 700;
letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}

.done-btn:hover { border-color: var(–green); color: var(–green); background: var(–green-light); }
.done-btn.done { border-color: var(–green); color: var(–green); background: var(–green-light); }

@keyframes drop { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
.layout { grid-template-columns: 1fr; }
.sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(–border); }
.content { padding: 28px 20px; }
.hero { padding: 36px 20px 0; }
.pbar-wrap { padding: 12px 20px; }
.phrase-item { grid-template-columns: 1fr; }
.phrase-pt { border-right: none; border-bottom: 1px solid var(–border); }
}
</style>

</head>
<body>

<div class="hero">
  <div class="hero-top">
    <span class="brand">RUTA360</span>
    <span class="flag">🇧🇷</span>
    <span class="lang-badge">IDIOMAS</span>
  </div>
  <h1>Portugués<br><em>Básico</em></h1>
  <p class="hero-sub">Aprende el idioma más hablado de Sudamérica y abre las puertas al mercado laboral brasileño desde Costa Rica.</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-num">4</div><div class="hstat-label">Módulos</div></div>
    <div class="hstat"><div class="hstat-num">16</div><div class="hstat-label">Lecciones</div></div>
    <div class="hstat"><div class="hstat-num">~4h</div><div class="hstat-label">Duración</div></div>
    <div class="hstat"><div class="hstat-num">A1</div><div class="hstat-label">Nivel</div></div>
  </div>
</div>

<div class="pbar-wrap">
  <span class="pl">Progreso</span>
  <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
  <span class="pp" id="pp">0%</span>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<script>
const MODS = [
  {
    title: 'Primeros Pasos',
    lessons: [
      {
        id: 'l1',
        title: '¿Por qué aprender portugués?',
        html: () => `
          <div class="lhd">
            <span class="ltag">Módulo 1 · Lección 1</span>
            <h2 class="ltitle">¿Por qué Aprender Portugués?</h2>
            <p class="ldesc">El portugués es la 5ta lengua más hablada del mundo y la puerta de entrada al mercado brasileño, el más grande de América Latina.</p>
          </div>

          <div class="sec">
            <div class="stitle">El portugués en números</div>
            <div class="g2">
              <div class="card"><div class="ci">🌍</div><div class="ct">260 millones</div><div class="cd">hablantes nativos en el mundo. 5to idioma más hablado.</div></div>
              <div class="card"><div class="ci">🇧🇷</div><div class="ct">Brasil</div><div class="cd">La economía más grande de LATAM. 215 millones de personas.</div></div>
              <div class="card"><div class="ci">💼</div><div class="ct">Mercado laboral</div><div class="cd">Empresas brasileñas con presencia en Costa Rica buscan bilingües español-portugués.</div></div>
              <div class="card"><div class="ci">📈</div><div class="ct">Baja oferta</div><div class="cd">Muy pocos costarricenses hablan portugués. Alta demanda, poca competencia.</div></div>
            </div>
          </div>

          <div class="sec">
            <div class="stitle">Ventaja para hispanohablantes</div>
            <p class="body">El español y el portugués son primos lingüísticos. Comparten el <strong>89% del vocabulario base</strong>, gramática similar y estructura de frases parecida. Un hispanohablante aprende portugués mucho más rápido que cualquier otro idioma.</p>
            <div class="callout c-good" style="margin-top:16px">
              <div class="clabel">✅ Buena noticia</div>
              <p>Si ya hablas español, ya sabes portugués a medias sin saberlo. Palabras como <strong>casa, trabalho, família, música, importante</strong> — son iguales o casi iguales en ambos idiomas.</p>
            </div>
          </div>

          <div class="sec">
            <div class="stitle">Diferencia entre portugués de Brasil y Portugal</div>
            <div class="tw">
              <table>
                <thead><tr><th></th><th>Brasil 🇧🇷</th><th>Portugal 🇵🇹</th></tr></thead>
                <tbody>
                  <tr><td><strong>Pronunciación</strong></td><td>Más abierta, vocal, musical</td><td>Más cerrada y rápida</td></tr>
                  <tr><td><strong>Velocidad</strong></td><td>Más lenta y clara</td><td>Más rápida</td></tr>
                  <tr><td><strong>Relevancia LATAM</strong></td><td>Alta — mercado regional</td><td>Media — más negocios globales</td></tr>
                  <tr><td><strong>Este curso</strong></td><td>✅ Enfoque principal</td><td>Menciones ocasionales</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        `
      },
      {
        id: 'l2',
        title: 'Pronunciación y sonidos clave',
        html: () => `
          <div class="lhd">
            <span class="ltag">Módulo 1 · Lección 2</span>
            <h2 class="ltitle">Pronunciación y Sonidos Clave</h2>
            <p class="ldesc">El mayor reto del portugués para hispanohablantes es la pronunciación. Estos son los sonidos que más confunden y cómo dominarlos.</p>
          </div>

          <div class="sec">
            <div class="stitle">Las 5 diferencias de pronunciación más importantes</div>
            <div class="tw">
              <table>
                <thead><tr><th>Sonido</th><th>En portugués</th><th>Ejemplo</th><th>Se pronuncia</th></tr></thead>
                <tbody>
                  <tr><td><strong>ã / ão</strong></td><td>Sonido nasal (como "an" con nariz tapada)</td><td>irmão (hermano)</td><td>"ir-MAWN"</td></tr>
                  <tr><td><strong>lh</strong></td><td>Como la "ll" del español rioplatense</td><td>trabalho (trabajo)</td><td>"tra-BA-lyo"</td></tr>
                  <tr><td><strong>nh</strong></td><td>Como la "ñ" del español</td><td>amanhã (mañana)</td><td>"a-ma-NYA"</td></tr>
                  <tr><td><strong>r (inicio)</strong></td><td>Como "j" suave en Brasil</td><td>Rio de Janeiro</td><td>"HIO de ja-NEI-ro"</td></tr>
                  <tr><td><strong>s (entre vocales)</strong></td><td>Como "z"</td><td>casa (casa)</td><td>"CA-za"</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="sec">
            <div class="stitle">Palabras que se escriben igual pero suenan diferente</div>
            <div class="vocab-grid">
              <div class="vcard"><div class="vpt">casa</div><div class="ves">casa</div><div class="vpron">CA-za (s→z)</div></div>
              <div class="vcard"><div class="vpt">mesa</div><div class="ves">mesa</div><div class="vpron">ME-za (s→z)</div></div>
              <div class="vcard"><div class="vpt">rosa</div><div class="ves">rosa</div><div class="vpron">HO-za (r+s→z)</div></div>
              <div class="vcard"><div class="vpt">hotel</div><div class="ves">hotel</div><div class="vpron">o-TEU (l→u)</div></div>
            </div>
          </div>

          <div class="callout c-tip">
            <div class="clabel">💡 Tip de pronunciación</div>
            <p>En el portugués brasileño, la vocal "o" al final de palabra suena como "u". Por eso <strong>banco</strong> suena "BAN-ku" y <strong>livro</strong> (libro) suena "LI-vru". ¡Practícalo en voz alta!</p>
          </div>
        `
      },
      {
        id: 'l3',
        title: 'Saludos y presentaciones básicas',
        html: () => `
          <div class="lhd">
            <span class="ltag">Módulo 1 · Lección 3</span>
            <h2 class="ltitle">Saludos y Presentaciones Básicas</h2>
            <p class="ldesc">Las primeras palabras que usarás en cualquier conversación en portugués. Memoriza estas y ya puedes presentarte en Brasil.</p>
          </div>

          <div class="sec">
            <div class="stitle">Saludos esenciales</div>
            <div class="phrase-list">
              <div class="phrase-item"><div class="phrase-pt">Olá / Oi</div><div class="phrase-es">Hola (formal / informal)</div></div>
              <div class="phrase-item"><div class="phrase-pt">Bom dia</div><div class="phrase-es">Buenos días</div></div>
              <div class="phrase-item"><div class="phrase-pt">Boa tarde</div><div class="phrase-es">Buenas tardes</div></div>
              <div class="phrase-item"><div class="phrase-pt">Boa noite</div><div class="phrase-es">Buenas noches</div></div>
              <div class="phrase-item"><div class="phrase-pt">Tudo bem?</div><div class="phrase-es">¿Todo bien? / ¿Cómo estás?</div></div>
              <div class="phrase-item"><div class="phrase-pt">Tudo bem, obrigado(a)!</div><div class="phrase-es">¡Todo bien, gracias!</div></div>
              <div class="phrase-item"><div class="phrase-pt">Até logo / Tchau</div><div class="phrase-es">Hasta luego / Chao</div></div>
            </div>
          </div>

          <div class="sec">
            <div class="stitle">Presentarte en portugués</div>
            <div class="grammar">
              <div class="glabel">Frases de presentación</div>
              <div class="gtext">
                Meu nome é <span class="ph">[tu nombre]</span>. → Mi nombre es ___.<br>
                Eu sou de <span class="ph">[Costa Rica / San José]</span>. → Soy de ___.<br>
                Eu tenho <span class="ph">[22]</span> anos. → Tengo ___ años.<br>
                Eu trabalho como <span class="ph">[profesión]</span>. → Trabajo como ___.<br>

// STATE
const done = new Set();
let cur = null;
const all = MODS.flatMap(m => m.lessons);
const total = all.length;

function upd() {
  const p = Math.round((done.size / total) * 100);
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('pp').textContent = p + '%';
}

function buildSB() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  MODS.forEach((mod, mi) => {
    const g = document.createElement('div');
    g.className = 'mod-grp';
    const hd = document.createElement('div');
    hd.className = 'mod-hd';
    hd.innerHTML = `<span class="mod-nm">${mod.title}</span><span class="mod-tg">0${mi+1}</span>`;
    g.appendChild(hd);
    mod.lessons.forEach(l => {
      const b = document.createElement('button');
      b.className = 'les-b' + (done.has(l.id) ? ' done' : '') + (cur === l.id ? ' active' : '');
      b.innerHTML = `<span class="ld">${done.has(l.id) ? '✓' : '○'}</span>${l.title}`;
      b.onclick = () => load(l.id);
      g.appendChild(b);
    });
    sb.appendChild(g);
  });
}

function load(id) {
  const l = all.find(x => x.id === id);
  if (!l) return;
  cur = id;
  const c = document.getElementById('content');
  c.innerHTML = l.html();

  const db = document.createElement('button');
  db.className = 'done-btn' + (done.has(id) ? ' done' : '');
  db.textContent = done.has(id) ? '✓ Lección completada' : 'Marcar como completada';
  db.onclick = () => { done.add(id); db.className = 'done-btn done'; db.textContent = '✓ Lección completada'; upd(); buildSB(); };
  c.appendChild(db);

  const nav = document.createElement('div');
  nav.className = 'lnav';
  const idx = all.findIndex(x => x.id === id);
  const prev = all[idx - 1];
  const next = all[idx + 1];

  const pb = document.createElement('button');
  pb.className = 'nbtn'; pb.innerHTML = '← Anterior'; pb.disabled = !prev;
  pb.onclick = () => prev && load(prev.id);

  const nb = document.createElement('button');
  nb.className = 'nbtn primary';
  nb.innerHTML = next ? 'Siguiente →' : '🎉 Finalizar curso';
  nb.onclick = () => next && load(next.id);

  nav.appendChild(pb); nav.appendChild(nb);
  c.appendChild(nav);
  buildSB();
  window.scrollTo(0, 0);
}

buildSB();
load(all[0].id);
</script>
